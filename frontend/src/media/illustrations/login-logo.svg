<svg width="320" height="84" viewBox="0 0 320 84" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="xscEmblem" x1="14" y1="14" x2="62" y2="62" gradientUnits="userSpaceOnUse">
      <stop stop-color="#06b6d4"/>
      <stop offset="1" stop-color="#14b8a6"/>
    </linearGradient>
    <filter id="glowEffect" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Enhanced background box with better contrast -->
  <rect x="4" y="10" width="64" height="64" rx="16" fill="#0a0f1e"/>
  <rect x="4.5" y="10.5" width="63" height="63" rx="15.5" stroke="#06b6d4" stroke-opacity="0.8" stroke-width="1.5"/>

  <!-- Brighter X emblem with glow -->
  <g filter="url(#glowEffect)">
    <path d="M23 28 L49 56" stroke="url(#xscEmblem)" stroke-width="8" stroke-linecap="round" opacity="0.95"/>
    <path d="M49 28 L23 56" stroke="url(#xscEmblem)" stroke-width="8" stroke-linecap="round" opacity="0.95"/>
  </g>

  <!-- XSCALE text - brighter white -->
  <text x="84" y="46" font-family="Orbitron, Arial, sans-serif" font-weight="700" font-size="30" letter-spacing="3" fill="#ffffff" opacity="0.98">XSCALE</text>

  <!-- AI text - vibrant cyan -->
  <text x="262" y="46" font-family="Orbitron, Arial, sans-serif" font-weight="700" font-size="30" letter-spacing="2" fill="#06b6d4">AI</text>

  <!-- TECHNOLOGIES text - clearer gray -->
  <text x="86" y="66" font-family="Orbitron, Arial, sans-serif" font-weight="500" font-size="11" letter-spacing="6" fill="#cbd5e1">TECHNOLOGIES</text>
</svg>
